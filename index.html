<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi THPT 2026 | Môn Toán</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #fdf2f8; /* Đổi sang tone hồng nhạt dễ thương */
            --text-main: #1e293b;
            --white: #ffffff;
            --border: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 3rem 1rem 5rem;
            text-align: center;
        }

        .container {
            max-width: 850px;
            margin: -3rem auto 4rem;
            padding: 0 1.5rem;
        }

        .sticky-nav {
            position: sticky; top: 1rem; z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem; border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .progress-bar {
            height: 10px; background: #e2e8f0;
            border-radius: 10px; overflow: hidden;
        }

        #progress-fill {
            height: 100%; background: #ec4899; /* Thanh tiến trình màu hồng */
            width: 0%; transition: width 0.4s ease;
        }

        .question-card {
            background: var(--white);
            padding: 2rem; border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .q-badge {
            background: #fdf2f8; color: #db2777;
            padding: 0.3rem 0.8rem; border-radius: 0.5rem;
            font-weight: 800; font-size: 0.8rem;
        }

        .option-label {
            display: flex; align-items: center;
            padding: 0.8rem 1rem; border: 1.5px solid #f1f5f9;
            border-radius: 1rem; cursor: pointer; margin-bottom: 0.5rem;
            transition: 0.2s;
        }

        .option-label:hover { border-color: #6366f1; background: #f8fafc; }

        .tf-row {
            background: #f9fafb; padding: 1rem;
            border-radius: 0.8rem; margin-bottom: 0.6rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .short-input {
            width: 100%; padding: 1rem;
            border: 2px solid #e2e8f0; border-radius: 0.8rem;
            font-size: 1rem; outline: none;
        }

        .btn-main {
            background: #ec4899; color: white; border: none;
            padding: 1.2rem 2.5rem; font-weight: 800;
            border-radius: 1rem; cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(236, 72, 153, 0.39);
        }

        #result-box {
            display: none; background: white;
            padding: 3rem; border-radius: 2rem; text-align: center;
        }

        .score-display { font-size: 4rem; font-weight: 800; color: #ec4899; }
    </style>
</head>
<body>

<header>
    <h1>HỌC TOÁN CÙNG CÔ BÉ 🌸</h1>
    <p>Cố gắng lên nhé, mỗi câu hỏi là một bước gần hơn tới ước mơ!</p>
</header>

<div class="container">
    <div class="sticky-nav">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-weight:bold; font-size:0.9rem">
            <span>Tiến độ của ẻm:</span>
            <span id="progress-text">0/30 câu</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <form id="quiz-form">
        <div id="questions-container"></div>
        <div style="text-align:center; margin-top:2rem">
            <button type="button" class="btn-main" onclick="processResult()">NỘP BÀI NÈ ✨</button>
        </div>
    </form>

    <div id="result-box">
        <h2 id="result-title">KẾT QUẢ ĐÂY RỒI! ✨</h2>
        <div class="score-display" id="score-val">0/30</div>
        <p style="font-size: 1.1rem; color: #475569; line-height: 1.8;" id="feedback-msg"></p>
        <button class="btn-main" style="background:#6366f1" onclick="location.reload()">LÀM LẠI KHÔNG NÈ?</button>
    </div>
</div>

<script>
    const quizData = [
        // Phần 1: Trắc nghiệm (15 câu)
        { id: 1, type: 'mcq', q: "Cho hàm số \\(y = f(x)\\) có bảng biến thiên với \\(f'(x) < 0\\) trên khoảng \\((-\\infty; -1)\\). Hàm số nghịch biến trên khoảng nào?", options: ["\\((-\\infty; -1)\\)", "\\((-1; +\\infty)\\)", "\\((0; +\\infty)\\)", "\\(\\mathbb{R}\\)"], a: 0 },
        { id: 2, type: 'mcq', q: "Đường tiệm cận đứng của đồ thị hàm số \\(y = \\frac{x+1}{x-2}\\) là:", options: ["x = -1", "y = 1", "x = 2", "y = 2"], a: 2 },
        { id: 3, type: 'mcq', q: "Trong không gian \\(Oxyz\\), cho \\(A(1; 2; -3), B(3; 0; 1)\\). Trung điểm \\(M\\) của AB là:", options: ["(2; 1; -1)", "(4; 2; -2)", "(1; -1; 2)", "(2; 1; 1)"], a: 0 },
        { id: 4, type: 'mcq', q: "Giá trị lớn nhất của hàm số \\(y = -x^4 + 4x^2 + 1\\) trên đoạn \\([0; 2]\\) là:", options: ["1", "5", "4", "0"], a: 1 },
        { id: 5, type: 'mcq', q: "Cho \\(\\log_2 3 = a\\). Tính \\(\\log_4 9\\) theo \\(a\\):", options: ["2a", "a", "a^2", "1/a"], a: 1 },
        { id: 6, type: 'mcq', q: "Vectơ đơn vị trên trục tọa độ \\(Oz\\) là:", options: ["\\(\\vec{i}\\)", "\\(\\vec{j}\\)", "\\(\\vec{k}=(0;0;1)\\)", "\\(\\vec{u}\\)"], a: 2 },
        { id: 7, type: 'mcq', q: "Chọn ngẫu nhiên 2 quả từ hộp (7 nam, 3 nữ). Xác suất chọn được 2 quả nữ là:", options: ["1/15", "3/10", "1/5", "7/15"], a: 0 },
        { id: 8, type: 'mcq', q: "Hàm số \\(y = x^3 - 3x + 2\\) đạt cực tiểu tại:", options: ["x = 0", "x = 2", "x = 1", "x = -1"], a: 2 },
        { id: 9, type: 'mcq', q: "Đạo hàm của hàm số \\(y = 3^x\\) là:", options: ["\\(3^x \\ln 3\\)", "\\(x.3^{x-1}\\)", "\\(3^x/\\ln 3\\)", "\\(3^x\\)"], a: 0 },
        { id: 10, type: 'mcq', q: "Tâm đối xứng của đồ thị hàm số \\(y = \\frac{2x-1}{x+1}\\) là:", options: ["(1; 2)", "(-1; 2)", "(2; -1)", "(-1; -1)"], a: 1 },
        { id: 11, type: 'mcq', q: "Tâm mặt cầu \\(x^2+y^2+z^2-4x+2y-6z+5=0\\) là:", options: ["(2; -1; 3)", "(-2; 1; -3)", "(4; -2; 6)", "(2; 1; 3)"], a: 0 },
        { id: 12, type: 'mcq', q: "Cho biến cố độc lập \\(P(A)=0.3; P(B)=0.4\\). Tính \\(P(A \\cap B)\\):", options: ["0.7", "0.1", "0.12", "0.5"], a: 2 },
        { id: 13, type: 'mcq', q: "Khối tứ diện đều có bao nhiêu đỉnh?", options: ["4", "6", "8", "12"], a: 0 },
        { id: 14, type: 'mcq', q: "Tập xác định của hàm số \\(y = (x-1)^{-2}\\) là:", options: ["R", "R \\ {1}", "(1; +inf)", "[1; +inf)"], a: 1 },
        { id: 15, type: 'mcq', q: "Nguyên hàm của \\(f(x) = e^x + \\cos x\\) là:", options: ["\\(e^x - \\sin x + C\\)", "\\(e^x + \\sin x + C\\)", "Lựa chọn khác", "Lựa chọn khác"], a: 1 },

        // Phần 2: Đúng/Sai (7 câu: 16 -> 22)
        { id: 16, type: 'tf', q: "Cho hàm số \\(y = \\frac{x^2+x-2}{x-2}\\). Xét tính đúng sai:", options: ["Hàm số đồng biến trên từng khoảng xác định", "Đồ thị có tiệm cận xiên \\(y = x + 3\\)", "Đồ thị có tiệm cận đứng \\(x = 2\\)", "Đạt cực đại tại \\(x = 0\\)"], a: [true, true, true, false] },
        { id: 17, type: 'tf', q: "Cho mặt phẳng \\((P): x - 2y + 2z - 3 = 0\\):", options: ["Vectơ pháp tuyến \\(\\vec{n}=(1; -2; 2)\\)", "Điểm \\(M(1; 1; 2)\\) thuộc (P)", "Khoảng cách từ O đến (P) bằng 1", "Mặt phẳng (P) song song trục Ox"], a: [true, true, true, false] },
        { id: 18, type: 'tf', q: "Xét hàm số \\(f(x) = x^4 - 2x^2 + 3\\):", options: ["Hàm số có 3 điểm cực trị", "Giá trị cực tiểu bằng 2", "Hàm số đồng biến trên (1; +inf)", "Đồ thị đối xứng qua gốc tọa độ O"], a: [true, true, true, false] },
        { id: 19, type: 'tf', q: "Cho \\(\\vec{a}=(1;0;2), \\vec{b}=(-2;1;3)\\):", options: ["\\(\\vec{a}+\\vec{b} = (-1;1;5)\\)", "Tích vô hướng bằng 4", "Vectơ \\(\\vec{a}\\) vuông góc với \\(\\vec{b}\\)", "Độ dài \\(|\\vec{a}| = \\sqrt{5}\\)"], a: [true, true, false, true] },
        { id: 20, type: 'tf', q: "Xét hàm số số mũ \\(y = 2^x\\):", options: ["Hàm số đồng biến trên R", "Đồ thị cắt trục tung tại (0;1)", "Đồ thị có tiệm cận ngang y=0", "Tập giá trị là R"], a: [true, true, true, false] },
        { id: 21, type: 'tf', q: "Cho hình hộp chữ nhật \\(ABCD.A'B'C'D'\\):", options: ["\\(\\vec{AB} + \\vec{AD} + \\vec{AA'} = \\vec{AC'}\\)", "Các mặt đều là hình vuông", "Độ dài \\(AC' = \\sqrt{AB^2+AD^2+AA'^2}\\)", "(ABCD) // (A'B'C'D')"], a: [true, false, true, true] },
        { id: 22, type: 'tf', q: "Phương trình \\(2^{x-1} = 8\\):", options: ["Là phương trình mũ cơ bản", "Nghiệm là x = 4", "Điều kiện là x > 1", "Vế trái luôn dương"], a: [true, true, false, true] },

        // Phần 3: Trả lời ngắn (8 câu: 23 -> 30)
        { id: 23, type: 'short', q: "Số điểm cực trị của hàm số \\(y = |x^2 - 4|\\)?", a: "3" },
        { id: 24, type: 'short', q: "Tính tích vô hướng của \\(\\vec{u}=(1;2;1)\\) và \\(\\vec{v}=(2;1;-4)\\).", a: "0" },
        { id: 25, type: 'short', q: "Quãng đường vật đi được sau 3s với vận tốc \\(v(t) = 3t^2 + 2t\\) (từ t=0).", a: "36" },
        { id: 26, type: 'short', q: "Tổng các nghiệm của phương trình \\(\\log_2(x^2 - 3x) = 2\\).", a: "3" },
        { id: 27, type: 'short', q: "Cho \\(f'(x) = 3x^2 + 1, f(0)=2\\). Tính \\(f(1)\\).", a: "4" },
        { id: 28, type: 'short', q: "Tìm \\(m > 0\\) để GTLN của \\(y = x^3 - 3x + m\\) trên [0; 2] bằng 10.", a: "8" },
        { id: 29, type: 'short', q: "Xác suất đỗ Toán 0.8, Anh 0.7. Hai môn độc lập, tính xác suất đỗ cả 2.", a: "0.56" },
        { id: 30, type: 'short', q: "Cho hình lập phương cạnh 2. Tính độ dài vectơ \\(\\vec{AB} + \\vec{AD}\\) (làm tròn 2 chữ số).", a: "2.83" }
    ];

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            let content = `<div class="question-header"><span class="q-badge">Câu ${index + 1}</span></div><div class="question-text">${item.q}</div><div style="margin-top:1.5rem">`;
            
            if (item.type === 'mcq') {
                content += `<div class="options-grid">` + item.options.map((opt, i) => `
                    <label class="option-label"><input type="radio" name="q${item.id}" value="${i}" onchange="updateProgress()"><span>${opt}</span></label>`).join('') + `</div>`;
            } else if (item.type === 'tf') {
                content += item.options.map((opt, i) => `
                    <div class="tf-row"><span>${opt}</span><div style="display:flex;gap:10px">
                    <label><input type="radio" name="q${item.id}_${i}" value="true" onchange="updateProgress()"> Đ</label>
                    <label><input type="radio" name="q${item.id}_${i}" value="false" onchange="updateProgress()"> S</label></div></div>`).join('');
            } else {
                content += `<input type="text" class="short-input" name="q${item.id}" placeholder="Nhập đáp án..." oninput="updateProgress()">`;
            }
            card.innerHTML = content + `</div>`;
            container.appendChild(card);
        });
        MathJax.typesetPromise();
    }

    function updateProgress() {
        let answered = 0;
        quizData.forEach(item => {
            if (item.type === 'mcq' && document.querySelector(`input[name="q${item.id}"]:checked`)) answered++;
            else if (item.type === 'short' && document.querySelector(`input[name="q${item.id}"]`).value.trim() !== "") answered++;
            else if (item.type === 'tf') {
                if (document.querySelector(`input[name="q${item.id}_0"]:checked`)) answered++;
            }
        });
        document.getElementById('progress-fill').style.width = (answered/30)*100 + '%';
        document.getElementById('progress-text').innerText = `${answered}/30 câu`;
    }

    function processResult() {
        let score = 0;
        quizData.forEach(item => {
            if (item.type === 'mcq') {
                const sel = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (sel && parseInt(sel.value) === item.a) score++;
            } else if (item.type === 'short') {
                const val = document.querySelector(`input[name="q${item.id}"]`).value.trim();
                if (val === item.a) score++;
            } else if (item.type === 'tf') {
                let ok = true;
                item.a.forEach((ans, i) => {
                    const sel = document.querySelector(`input[name="q${item.id}_${i}"]:checked`);
                    if (!sel || (sel.value === 'true') !== ans) ok = false;
                });
                if (ok) score++;
            }
        });

        document.getElementById('quiz-form').style.display = 'none';
        document.querySelector('.sticky-nav').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-val').innerText = `${score}/30`;
        
        let msg = "";
        const rate = score / 30;
        if (rate >= 0.9) msg = "Chao ôi giỏi quá đi! ✨ Ẻm đúng là 'siêu nhân Toán học' rồi. Cứ giữ vững phong độ này để tự tin chinh phục kỳ thi 2026 nhé, cô gái nhỏ! 🌸";
        else if (rate >= 0.7) msg = "Kết quả xịn xò lắm nha! 🍬 Ẻm chỉ thiếu một chút xíu xiu sự cẩn thận nữa thôi là đạt điểm tuyệt đối rồi. Về 'nựng' lại mấy câu vận dụng cao một chút là ổn ngay thôi mà! ✌️";
        else if (rate >= 0.5) msg = "Tạm ổn nè, nhưng mình vẫn còn hơi 'giận' nhau với vài kiến thức đúng không? 🌿 Đừng nản lòng nhé, ôn lại một chút rồi làm lại đề này, tớ tin Ẻm sẽ làm tốt hơn nhiều luôn! 💪";
        else msg = "Úi, có vẻ hôm nay Ẻm hơi mệt nên làm bài chưa đúng ý rồi... ☁️ Đừng buồn nhé! Hãy hít một hơi thật sâu, ăn một viên kẹo ngọt rồi chúng mình xem lại kiến thức căn bản nha. Tớ luôn ở đây cổ vũ Ẻm! 🎈";
        
        document.getElementById('feedback-msg').innerText = msg;
        window.scrollTo(0, 0);
    }

    renderQuiz();
</script>
</body>
</html>
