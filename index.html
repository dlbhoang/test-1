<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra Toán 12 | 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #6366f1; --pink: #ec4899; --bg: #fdf2f8; --white: #ffffff; --correct: #22c55e; --wrong: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; color: #1e293b; }
        header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; padding: 2rem 1rem; text-align: center; }
        .container { max-width: 900px; margin: 0 auto 5rem; padding: 0 1rem; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); padding: 1rem; border-radius: 0 0 1rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        
        .timer-box { font-weight: 800; color: #ef4444; font-size: 1.2rem; }
        .question-card { background: var(--white); padding: 1.5rem; border-radius: 1.2rem; margin-top: 1.5rem; border: 1px solid #f1f5f9; }
        .q-badge { background: #fdf2f8; color: var(--pink); padding: 0.3rem 0.7rem; border-radius: 0.5rem; font-weight: 800; font-size: 0.8rem; }
        
        .option-label { display: flex; align-items: center; padding: 0.8rem; border: 1.5px solid #f1f5f9; border-radius: 0.8rem; cursor: pointer; margin-bottom: 0.5rem; }
        .option-label input { margin-right: 10px; accent-color: var(--pink); }

        .explanation { display: none; margin-top: 1rem; padding: 1rem; background: #f0fdf4; border-left: 4px solid var(--correct); border-radius: 0.5rem; font-size: 0.9rem; color: #166534; }
        .btn-main { background: var(--pink); color: white; border: none; padding: 1rem 2rem; font-weight: 800; border-radius: 1rem; cursor: pointer; }
        
        #result-box { display: none; background: white; padding: 2rem; border-radius: 2rem; text-align: center; margin-top: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tf-row { background: #f8fafc; padding: 0.7rem; border-radius: 0.8rem; margin-bottom: 0.4rem; display: flex; justify-content: space-between; align-items: center; }
        .short-input { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 0.8rem; box-sizing: border-box; }
        
        /* Màu sắc phản hồi */
        .is-correct { border-color: var(--correct) !important; background: #f0fdf4 !important; }
        .is-wrong { border-color: var(--wrong) !important; background: #fef2f2 !important; }
    </style>
</head>
<body>

<header>
    <h1>TOÁN 12 - CHINH PHỤC KỲ THI 2026 🌸</h1>
    <p>Thời gian: 45 Phút | Chỉ được làm 1 lần duy nhất</p>
</header>

<div class="container">
    <div id="quiz-section">
        <div class="sticky-header">
            <div class="timer-box">⏳ <span id="time-left">45:00</span></div>
            <div style="font-weight: 700;">Tiến độ: <span id="progress-text" style="color:var(--pink)">0/30</span></div>
        </div>

        <form id="quiz-form">
            <div id="questions-container"></div>
            <div style="text-align:center; margin-top:3rem">
                <button type="button" class="btn-main" onclick="confirmSubmit()">NỘP BÀI & XEM GIẢI THÍCH ✨</button>
            </div>
        </form>
    </div>

    <div id="result-box">
        <h2 style="color:var(--primary)">KẾT QUẢ CỦA ẺM</h2>
        <div style="font-size: 4rem; font-weight: 800; color: var(--pink); margin: 1rem 0;" id="score-val">0/30</div>
        <p id="feedback-msg" style="margin-bottom: 1.5rem;"></p>
        <button class="btn-main" onclick="saveResultJson()">LƯU KẾT QUẢ VÀ TẢI JSON 💾</button>
        <p id="json-save-msg" style="margin-top: 1rem; color: #64748b; font-size: 0.8rem;"></p>
    </div>
</div>

<script>
    const TOTAL_TIME = 45 * 60;

    const quizData = [
        // PHẦN 1: TRẮC NGHIỆM 1 ĐÁP ÁN (15 câu)
        { id: 1, type: 'mcq', q: "Hàm số \\(y = \\frac{x+1}{x-2}\\) có tiệm cận đứng là:", options: ["x = -1", "y = 1", "x = 2", "y = 2"], a: 2, ex: "Mẫu số bằng 0 khi x = 2." },
        { id: 2, type: 'mcq', q: "Hàm số \\(y = x^3 - 3x^2 + 1\\) nghịch biến trên khoảng nào?", options: ["(0; 2)", "(-inf; 0)", "(2; +inf)", "R"], a: 0, ex: "y' = 3x^2 - 6x. y' < 0 trong khoảng (0; 2)." },
        { id: 3, type: 'mcq', q: "Trong không gian Oxyz, cho \\(A(1; 2; 3), B(3; 0; 1)\\). Trung điểm AB là:", options: ["(2; 1; 2)", "(4; 2; 4)", "(1; -1; -1)", "(2; 2; 2)"], a: 0, ex: "Tọa độ trung điểm: ((1+3)/2; (2+0)/2; (3+1)/2) = (2; 1; 2)." },
        { id: 4, type: 'mcq', q: "Tính đạo hàm của \\(y = e^{2x}\\):", options: ["e^{2x}", "2e^{2x}", "1/2 e^{2x}", "e^x"], a: 1, ex: "(e^{u})' = u' e^u. Ở đây u = 2x nên y' = 2e^{2x}." },
        { id: 5, type: 'mcq', q: "Thể tích khối lập phương cạnh 3 là:", options: ["9", "27", "6", "18"], a: 1, ex: "V = cạnh^3 = 3^3 = 27." },
        { id: 6, type: 'mcq', q: "Nghiệm của phương trình \\(\\log_2(x-1) = 3\\) là:", options: ["x=9", "x=7", "x=10", "x=8"], a: 0, ex: "x-1 = 2^3 = 8 => x = 9." },
        { id: 7, type: 'mcq', q: "Vectơ pháp tuyến của mặt phẳng \\(x - 2y + z - 5 = 0\\) là:", options: ["(1; 2; 1)", "(1; -2; 1)", "(-2; 1; -5)", "(1; -2; -5)"], a: 1, ex: "Hệ số trước x, y, z là (1; -2; 1)." },
        { id: 8, type: 'mcq', q: "Giá trị lớn nhất của \\(y = \sin x\\) là:", options: ["0", "2", "1", "pi"], a: 2, ex: "Hàm sin luôn nằm trong đoạn [-1; 1]." },
        { id: 9, type: 'mcq', q: "Nguyên hàm của \\(1/x\\) (với x > 0) là:", options: ["ln x + C", "-1/x^2 + C", "e^x + C", "x^2 + C"], a: 0, ex: "Đây là công thức nguyên hàm cơ bản." },
        { id: 10, type: 'mcq', q: "Số cách chọn 2 học sinh từ 10 học sinh là:", options: ["20", "45", "100", "90"], a: 1, ex: "Dùng tổ hợp: C(10, 2) = 45." },
        { id: 11, type: 'mcq', q: "Đường cong hình bên là đồ thị hàm số nào? (Giả định hàm bậc 3 có a > 0)", options: ["y=x^3-3x", "y=-x^3+3x", "y=x^4-2x^2", "y=1/x"], a: 0, ex: "Đồ thị bậc 3 dạng chữ N có hệ số a dương." },
        { id: 12, type: 'mcq', q: "Tâm mặt cầu \\((x-1)^2 + y^2 + (z+2)^2 = 9\\) là:", options: ["(1; 0; 2)", "(1; 0; -2)", "(-1; 0; 2)", "(1; 1; -2)"], a: 1, ex: "Đổi dấu các số trong ngoặc: (1; 0; -2)." },
        { id: 13, type: 'mcq', q: "Cho \\(A, B\\) xung khắc. \\(P(A)=0.2, P(B)=0.5\\). Tính \\(P(A \cup B)\\):", options: ["0.7", "0.1", "0.3", "0.35"], a: 0, ex: "Xung khắc nên P(A hợp B) = P(A) + P(B) = 0.7." },
        { id: 14, type: 'mcq', q: "Hàm số \\(y = 2^x\\) luôn đi qua điểm nào?", options: ["(0;0)", "(1;0)", "(0;1)", "(1;1)"], a: 2, ex: "Thay x=0 vào: 2^0 = 1." },
        { id: 15, type: 'mcq', q: "Tiệm cận ngang của \\(y = \\frac{2x-1}{x+1}\\) là:", options: ["y=2", "x=-1", "y=-1", "x=2"], a: 0, ex: "Lấy hệ số x ở tử chia mẫu: 2/1 = 2." },

        // PHẦN 2: ĐÚNG/SAI (7 câu)
        { id: 16, type: 'tf', q: "Cho hàm số \\(y = x^4 - 2x^2 + 1\\):", options: ["Hàm số có 3 điểm cực trị", "Giá trị cực tiểu là 0", "Hàm số đồng biến trên (0; 1)", "Đồ thị đối xứng qua trục Oy"], a: [true, true, false, true], ex: "y' = 4x^3 - 4x. Cực trị tại 0, 1, -1. Khoảng (0;1) hàm nghịch biến." },
        { id: 17, type: 'tf', q: "Cho mặt phẳng \\((P): x + y - z - 1 = 0\\):", options: ["Vectơ pháp tuyến là (1; 1; -1)", "Điểm A(1; 1; 1) thuộc (P)", "P song song với mặt phẳng x+y-z+5=0", "P đi qua gốc tọa độ O"], a: [true, true, true, false], ex: "Thay O(0,0,0) vào: -1 = 0 (vô lý)." },
        { id: 18, type: 'tf', q: "Xét hàm số mũ \\(y = (0.5)^x\\):", options: ["Hàm số đồng biến trên R", "Đồ thị nằm phía trên trục Ox", "Có tiệm cận ngang y = 0", "Cắt trục tung tại (0; 1)"], a: [false, true, true, true], ex: "Cơ số 0.5 < 1 nên hàm nghịch biến." },
        { id: 19, type: 'tf', q: "Cho \\(\\vec{a}=(1; 2; 0)\\) và \\(\\vec{b}=(2; -1; 5)\\):", options: ["\\(\\vec{a} + \vec{b} = (3; 1; 5)\\)", "Tích vô hướng bằng 0", "Hai vectơ vuông góc với nhau", "Độ dài vectơ a là 5"], a: [true, true, true, false], ex: "Tích vô hướng: 1*2 + 2*(-1) + 0*5 = 0. Độ dài a = căn(1+4) = căn 5." },
        { id: 20, type: 'tf', q: "Xác suất:", options: ["P(A) luôn >= 0", "P(biến cố chắc chắn) = 1", "P(A) + P(biến cố đối) = 1", "P(A) có thể bằng 1.5"], a: [true, true, true, false], ex: "Xác suất không bao giờ vượt quá 1." },
        { id: 21, type: 'tf', q: "Khối đa diện:", options: ["Khối lập phương có 6 mặt", "Khối tứ diện đều có 4 mặt là tam giác đều", "Khối bát diện đều có 8 đỉnh", "Hình chóp tam giác có 4 mặt"], a: [true, true, false, true], ex: "Bát diện đều có 6 đỉnh, 8 mặt." },
        { id: 22, type: 'tf', q: "Đạo hàm và Nguyên hàm:", options: ["(sin x)' = cos x", "(cos x)' = sin x", "Nguyên hàm của x là x^2/2", "Đạo hàm của ln x là 1/x"], a: [true, false, true, true], ex: "(cos x)' = -sin x." },

        // PHẦN 3: TRẢ LỜI NGẮN (8 câu)
        { id: 23, type: 'short', q: "Số cực trị của hàm số \\(y = x^4 + x^2\\) là bao nhiêu?", a: "1", ex: "y' = 4x^3 + 2x = 2x(2x^2+1). Chỉ có 1 nghiệm x=0." },
        { id: 24, type: 'short', q: "Tính tích vô hướng của \\(\\vec{u}=(1;3)\\) và \\(\\vec{v}=(2;-1)\\).", a: "-1", ex: "1*2 + 3*(-1) = 2 - 3 = -1." },
        { id: 25, type: 'short', q: "Cho \\(\\log_2 x = 5\\). Tìm x.", a: "32", ex: "x = 2^5 = 32." },
        { id: 26, type: 'short', q: "Tính diện tích hình vuông có đường chéo bằng \\(\\sqrt{8}\\).", a: "4", ex: "Cạnh = đường chéo / căn 2 = 2. Diện tích = 2*2 = 4." },
        { id: 27, type: 'short', q: "Đạo hàm của \\(y = x^3\\) tại x = 2 bằng bao nhiêu?", a: "12", ex: "y' = 3x^2. Tại x=2: 3 * 2^2 = 12." },
        { id: 28, type: 'short', q: "Tìm m để đồ thị \\(y = x + m\\) đi qua gốc tọa độ O(0;0).", a: "0", ex: "0 = 0 + m => m = 0." },
        { id: 29, type: 'short', q: "Gieo một con xúc xắc, xác suất xuất hiện mặt 6 chấm là 1/k. Tìm k.", a: "6", ex: "Xác suất là 1/6 nên k = 6." },
        { id: 30, type: 'short', q: "Tính khoảng cách từ điểm \\(M(0; 0; 3)\\) đến mặt phẳng Oxy.", a: "3", ex: "Khoảng cách đến Oxy chính là trị tuyệt đối của cao độ z." }
    ];

    let timeLeft = TOTAL_TIME;
    let timer;

    window.onload = () => {
        if (localStorage.getItem("quiz_v2_done")) {
            showResult(localStorage.getItem("quiz_v2_score"));
            return;
        }
        renderQuiz();
        startTimer();
    };

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('time-left').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft <= 0) processResult();
        }, 1000);
    }

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${item.id}`;
            let html = `<span class="q-badge">CÂU ${index + 1}</span><p style="font-weight:600">${item.q}</p>`;
            
            if (item.type === 'mcq') {
                html += item.options.map((o, i) => `
                    <label class="option-label" id="label-${item.id}-${i}">
                        <input type="radio" name="q${item.id}" value="${i}" onchange="updateProg()"> ${o}
                    </label>`).join('');
            } else if (item.type === 'tf') {
                html += item.options.map((o, i) => `
                    <div class="tf-row"><span>${o}</span><div>
                        <label><input type="radio" name="q${item.id}_${i}" value="true" onchange="updateProg()"> Đ</label>
                        <label style="margin-left:10px"><input type="radio" name="q${item.id}_${i}" value="false" onchange="updateProg()"> S</label>
                    </div></div>`).join('');
            } else {
                html += `<input type="text" class="short-input" name="q${item.id}" placeholder="Nhập đáp án số..." oninput="updateProg()">`;
            }
            html += `<div class="explanation" id="ex-${item.id}"><b>Giải thích:</b> ${item.ex}</div>`;
            card.innerHTML = html;
            container.appendChild(card);
        });
        MathJax.typeset();
    }

    function updateProg() {
        let done = document.querySelectorAll('input:checked').length;
        document.getElementById('progress-text').innerText = `${done}/30`;
    }

    function confirmSubmit() {
        if (confirm("Ẻm chắc chắn nộp bài chứ?")) processResult();
    }

    function processResult() {
        clearInterval(timer);
        let score = 0;

        quizData.forEach(item => {
            document.getElementById(`ex-${item.id}`).style.display = 'block';
            if (item.type === 'mcq') {
                const sel = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (sel && parseInt(sel.value) === item.a) {
                    score++;
                    document.getElementById(`label-${item.id}-${sel.value}`).classList.add('is-correct');
                } else if (sel) {
                    document.getElementById(`label-${item.id}-${sel.value}`).classList.add('is-wrong');
                }
            } else if (item.type === 'short') {
                const val = document.querySelector(`input[name="q${item.id}"]`).value.trim();
                if (val === item.a) score++;
            } else if (item.type === 'tf') {
                let ok = true;
                item.a.forEach((ans, i) => {
                    const sel = document.querySelector(`input[name="q${item.id}_${i}"]:checked`);
                    if (!sel || (sel.value === 'true') !== ans) ok = false;
                });
                if (ok) score++;
            }
        });

        const finalScore = `${score}/30`;
        localStorage.setItem("quiz_v2_done", "true");
        localStorage.setItem("quiz_v2_score", finalScore);
        saveResultJson(finalScore);
        showResult(finalScore);
    }

    function getResultData(score) {
        const answers = quizData.map(item => {
            if (item.type === 'mcq') {
                const sel = document.querySelector(`input[name="q${item.id}"]:checked`);
                return { id: item.id, type: item.type, selected: sel ? parseInt(sel.value) : null };
            }
            if (item.type === 'tf') {
                return { id: item.id, type: item.type, selected: item.options.map((opt, i) => {
                    const sel = document.querySelector(`input[name="q${item.id}_${i}"]:checked`);
                    return sel ? sel.value === 'true' : null;
                }) };
            }
            const val = document.querySelector(`input[name="q${item.id}"]`).value.trim();
            return { id: item.id, type: item.type, answer: val };
        });

        return {
            score,
            total: quizData.length,
            date: new Date().toISOString(),
            answers
        };
    }

    function saveResultJson(score) {
        const resultData = getResultData(score);
        const json = JSON.stringify(resultData, null, 2);
        localStorage.setItem("quiz_v2_result_json", json);
        document.getElementById('json-save-msg').innerText = 'Kết quả đã được lưu vào JSON. Bạn có thể tải về dưới dạng file.';
        downloadJsonFile(json, 'ket-qua-toan-12.json');
    }

    function downloadJsonFile(json, fileName) {
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function showResult(score) {
        document.getElementById('quiz-section').style.opacity = '0.7';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-val').innerText = score;
        
        let rate = parseInt(score) / 30;
        let m = rate >= 0.8 ? "Tuyệt vời quá ẻm ơi! 🌟" : rate >= 0.5 ? "Làm tốt lắm, cố gắng thêm nhé! 🌸" : "Đừng buồn, ôn bài lại cùng nhau nha! 🍬";
        document.getElementById('feedback-msg').innerText = m;

        const existingJson = localStorage.getItem('quiz_v2_result_json');
        const msgEl = document.getElementById('json-save-msg');
        if (existingJson && !msgEl.innerText) {
            msgEl.innerText = 'Kết quả JSON đã được lưu trước đó. Nếu muốn, nộp lại để tải lại file.';
        }

        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
